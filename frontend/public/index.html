<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="icon" href="<%= BASE_URL %>favicon.ico" />
    
    <!-- Preconnect & DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <title><%= htmlWebpackPlugin.options.title %></title>
    <meta name="description" content="ZadStore - منصتك المتكاملة للتجارة الإلكترونية والتسويق بالعمولة. اكتشف أفضل المنتجات بأفضل الأسعار." />
    <meta name="keywords" content="تجارة إلكترونية, تسويق بالعمولة, زاد ستور, ZadStore, شراء أونلاين, مصر" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zadstore.com/" />
    <meta property="og:title" content="ZadStore - متجرك المفضل" />
    <meta property="og:description" content="تسوق الآن واحصل على أفضل العروض والخصومات على جميع المنتجات." />
    <meta property="og:image" content="<%= BASE_URL %>img/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://zadstore.com/" />
    <meta property="twitter:title" content="ZadStore - متجرك المفضل" />
    <meta property="twitter:description" content="تسوق الآن واحصل على أفضل العروض والخصومات على جميع المنتجات." />
    <meta property="twitter:image" content="<%= BASE_URL %>img/og-image.jpg" />

    <meta name="theme-color" content="#ff9800" />
    <link rel="canonical" href="https://zadstore.com/" />
    <style>
      /* src/assets/main.css أو App.vue */

/* تطبيق الخط على كل العناصر */
* {
  font-family: 'Cairo', sans-serif !important;
}

/* تأكيد التطبيق على عناصر Vuetify */
.v-application {
  font-family: 'Cairo', sans-serif !important;
}

/* تنسيق إضافي عشان الحروف تبان أحلى */
body {
  font-family: 'Cairo', sans-serif;
  -webkit-font-smoothing: antialiased; /* بيخلي الخط ناعم */
  background-color: #f5f5f5 !important;
}
    </style>
  </head>
  <body>
    <noscript>
      <strong
        >We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work
        properly without JavaScript enabled. Please enable it to
        continue.</strong
      >
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
